syntax = "proto3";

option java_package = "com.soulfiremc.grpc.generated";
option java_multiple_files = true;

package soulfire.v1;

import "google/protobuf/timestamp.proto";

enum EventSeverity {
  EVENT_SEVERITY_INFO = 0;
  EVENT_SEVERITY_SUCCESS = 1;
  EVENT_SEVERITY_WARN = 2;
  EVENT_SEVERITY_ERROR = 3;
}

enum EventCategory {
  EVENT_CATEGORY_SESSION = 0;
  EVENT_CATEGORY_BOT = 1;
  EVENT_CATEGORY_CHAT = 2;
  EVENT_CATEGORY_COMMAND = 3;
  EVENT_CATEGORY_SCRIPT = 4;
  EVENT_CATEGORY_MESSAGE = 5;
  EVENT_CATEGORY_SYSTEM = 6;
}

enum EventType {
  EVENT_TYPE_SESSION_STARTED = 0;
  EVENT_TYPE_SESSION_RESUMED = 1;
  EVENT_TYPE_SESSION_PAUSED = 2;
  EVENT_TYPE_SESSION_STOPPED = 3;
  EVENT_TYPE_BOT_CONNECTING = 4;
  EVENT_TYPE_BOT_JOINED = 5;
  EVENT_TYPE_BOT_DISCONNECTED = 6;
  EVENT_TYPE_CHAT_MESSAGE = 7;
  EVENT_TYPE_COMMAND_EXECUTED = 8;
  EVENT_TYPE_SCRIPT_ACTIVATED = 9;
  EVENT_TYPE_SCRIPT_PAUSED = 10;
  EVENT_TYPE_SCRIPT_COMPLETED = 11;
  EVENT_TYPE_SCRIPT_CANCELLED = 12;
  EVENT_TYPE_SCRIPT_ERROR = 13;
  EVENT_TYPE_MESSAGE = 14;
  EVENT_TYPE_SYSTEM_WARNING = 15;
  EVENT_TYPE_SYSTEM_ERROR = 16;
}

message GlobalEventScope {
}

message InstanceEventScope {
  string instance_id = 1;
}

message BotEventScope {
  string instance_id = 1;
  string bot_id = 2;
}

message InstanceScriptEventScope {
  string instance_id = 1;
  string script_id = 2;
}

message PersonalEventScope {
}

message EventScope {
  oneof scope {
    GlobalEventScope global = 1;
    InstanceEventScope instance = 2;
    BotEventScope bot = 3;
    InstanceScriptEventScope instance_script = 4;
    PersonalEventScope personal = 5;
  }
}

message EventEntry {
  string id = 1;
  google.protobuf.Timestamp timestamp = 2;
  EventSeverity severity = 3;
  EventCategory category = 4;
  EventType type = 5;
  string summary = 6;
  optional string body = 7;
  bool personal = 8;
  optional string instance_id = 9;
  optional string instance_name = 10;
  optional string bot_account_id = 11;
  optional string bot_account_name = 12;
  optional string script_id = 13;
  optional string script_name = 14;
  optional string user_id = 15;
  optional string user_name = 16;
  optional string command = 17;
  optional string logger_name = 18;
  int32 repeat_count = 19;
}

message PreviousEventRequest {
  EventScope scope = 1;
  int32 count = 2;
}

message PreviousEventResponse {
  repeated EventEntry events = 1;
}

message EventRequest {
  EventScope scope = 1;
}

message EventResponse {
  EventEntry event = 1;
}

service EventsService {
  rpc GetPrevious (PreviousEventRequest) returns (PreviousEventResponse) {}
  rpc Subscribe (EventRequest) returns (stream EventResponse) {}
}
